<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري المصادقة...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
        }
    </style>
</head>
<body class="bg-[#070b13] text-slate-200 min-h-screen flex items-center justify-center">
    <div class="text-center p-8 bg-slate-900/40 border border-slate-800 rounded-3xl backdrop-blur-md max-w-md w-full mx-4 shadow-2xl">
        <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500 mb-6"></div>
        <h1 class="text-xl font-bold mb-2">جاري المصادقة وحفظ الجلسة...</h1>
        <p class="text-sm text-slate-400">سيتم إغلاق هذه النافذة تلقائياً فور اكتمال العملية.</p>
    </div>

    <script>
        setTimeout(() => {
            if (window.opener) {
                window.opener.postMessage({ type: 'GITHUB_AUTH_SUCCESS' }, window.location.origin);
            }
            window.close();
        }, 2000);
    </script>
</body>
</html>
